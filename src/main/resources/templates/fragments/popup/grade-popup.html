<div class="modal-dialog modal-xl modal-dialog-scrollable" th:fragment="grade-popup">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title" id="fullscreenModalLabel">등급상세</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <div class="card mb-4">
                <div class="card-header">
                    <i class="fas fa-table me-1"></i>
                    기본정보
                </div>
                <div class="card-body">
                    <div class="row">
                        <table class="table table-bordered">
                            <tbody>
                            <tr>
                                <td class="col-lg-2">등급명</td>
                                <td class="col-lg-10">
                                    <div class="row">
                                        <div class="col-lg-4">
                                            <input type="text" class="form-control" id="name" />
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="col-lg-2">사용상태</td>
                                <td class="col-lg-10">
                                    <div class="row">
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                                            <label class="form-check-label" for="">
                                                사용중
                                            </label>
                                        </div>
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                                            <label class="form-check-label" for="">
                                                사용중지
                                            </label>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="col-lg-2">할인형태</td>
                                <td class="col-lg-10">
                                    <div class="row">
                                        <div class="col-lg-4">
                                            <input class="form-control" type="number" name="flexRadioDefault" id="">
                                        </div>
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                                            <label class="form-check-label" for="">
                                                정률
                                            </label>
                                        </div>
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                                            <label class="form-check-label" for="">
                                                정액
                                            </label>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="col-lg-2">적용금액</td>
                                <td class="col-lg-10">
                                    <div class="row">
                                        <div class="col-lg-4">
                                            <input type="number" class="form-control" id="minPrice" placeholder="최소금액" />
                                        </div>
                                        <div class="col-lg-4">
                                            <input type="number" class="form-control" id="maxPrice" placeholder="최대금액"/>
                                        </div>
                                        <div class="col-lg-3">
                                            <input type="checkbox" class="form-check-input" id="infiniteQty" />
                                            <label class="form-check-label" for="">
                                                제한없음
                                            </label>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="card mb-4">
                <div class="card-header">
                    <i class="fas fa-table me-1"></i>
                    적용상품정보
                </div>
                <div class="card-body">
                    <div class="row mb-4">
                        <div class="col-lg-3">
                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                            <label class="form-check-label" for="">
                                전체
                            </label>
                        </div>
                        <div class="col-lg-3">
                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                            <label class="form-check-label" for="">
                                특정
                            </label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-lg-6">
                            <div class="input-group mb-3">
                                <input type="text" class="form-control" placeholder="Recipient’s username" aria-label="Recipient’s username" aria-describedby="button-addon2">
                                <button class="btn btn-outline-secondary" type="button" id="button-addon2">적용상품추가</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
