<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.w3.org/1999/xhtml" layout:decorate="~{index}"
      xmlns:th="http://www.w3.org/1999/html">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
    </head>
    <body>
        <div layout:fragment="content">
            <main>
                <div class="container-fluid px-4">
                    <h3 class="mt-4 mb-4">쿠폰관리</h3>
                    <div class="card mb-4">
                        <div class="card-header">
                            <i class="fas fa-table me-1"></i>
                            검색조건
                        </div>
                        <div class="card-body">
                            <div class="row mb-2 justify-content-end">
                                <div class="col-auto">
                                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#fullscreenModal">
                                        등록
                                    </button>
                                </div>
                                <div class="col-auto">
                                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#fullscreenModal">
                                        검색
                                    </button>
                                </div>
                            </div>
                            <div class="row">
                                <table class="table table-bordered">
                                    <tbody>
                                    <tr>
                                        <td class="col-lg-2">등록일자</td>
                                        <td class="col-lg-10">
                                            <div class="row">
                                                <div class="col-lg-2">
                                                    <input id="startDate" class="form-control" type="date" />
                                                </div>
                                                ~
                                                <div class="col-lg-2">
                                                    <input id="endDate" class="form-control" type="date" />
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td class="col-lg-2">쿠폰유형</td>
                                        <td class="col-lg-10">
                                            <div class="row">
                                                <div class="col-lg-2">
                                                    <input type="checkbox" class="form-check-input" id="infiniteQty" />
                                                    <label class="form-check-label" for="">
                                                        상품
                                                    </label>
                                                </div>
                                                <div class="col-lg-2">
                                                    <input type="checkbox" class="form-check-input" id="infiniteQty" />
                                                    <label class="form-check-label" for="">
                                                        배달
                                                    </label>
                                                </div>
                                                <div class="col-lg-2">
                                                    <input type="checkbox" class="form-check-input" id="infiniteQty" />
                                                    <label class="form-check-label" for="">
                                                        멤버십
                                                    </label>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td class="col-lg-2">쿠폰상태</td>
                                        <td class="col-lg-10">
                                            <div class="row">
                                                <div class="col-lg-2">
                                                    <input type="checkbox" class="form-check-input" id="infiniteQty" />
                                                    <label class="form-check-label" for="">
                                                        사용가능
                                                    </label>
                                                </div>
                                                <div class="col-lg-2">
                                                    <input type="checkbox" class="form-check-input" id="infiniteQty" />
                                                    <label class="form-check-label" for="">
                                                        기간만료
                                                    </label>
                                                </div>
                                                <div class="col-lg-2">
                                                    <input type="checkbox" class="form-check-input" id="" />
                                                    <label class="form-check-label" for="">
                                                        사용대기
                                                    </label>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>검색</td>
                                        <td>
                                            <div class="row">
                                                <div class="col-lg-2">
                                                    <select class="form-select" aria-label="Default select example">
                                                        <option selected>쿠폰명</option>
                                                        <option value="1">쿠폰코드</option>
                                                    </select>
                                                </div>
                                                <div class="col-lg-4">
                                                    <input type="text" class="form-control" id="basicInput" />
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="card mb-4">
                        <div class="card-header">
                            <i class="fas fa-table me-1"></i>
                            리스트
                        </div>
                        <div class="card-body">
                            <div id="couponListTable"></div>
                        </div>
                        <script th:inline="javascript">
                            const couponListTable = new Tabulator("#couponListTable", {
                                height:"500px",
                                layout:"fitColumns",
                                columns:[
                                    {title:"Name", field:"name", width:200},
                                    {title:"Progress", field:"progress", hozAlign:"right", sorter:"number"},
                                    {title:"Gender", field:"gender", widthGrow:2},
                                    {title:"Rating", field:"rating", hozAlign:"center"},
                                    {title:"Favourite Color", field:"col", widthGrow:3},
                                    {title:"Date Of Birth", field:"dob", hozAlign:"center", sorter:"date", widthGrow:2},
                                    {title:"Driver", field:"car", hozAlign:"center"},
                                ],
                            });
                        </script>
                    </div>
                </div>
                <div class="modal fade" id="fullscreenModal" tabindex="-1" aria-labelledby="fullscreenModalLabel" aria-hidden="true">
                    <aside th:replace="fragments/popup/coupon-popup :: coupon-popup"></aside>
                </div>
            </main>
            <footer class="py-4 bg-light mt-auto">
                <div class="container-fluid px-4">
                    <div class="d-flex align-items-center justify-content-between small">
                        <div class="text-muted">Copyright &copy; Your Website 2023</div>
                        <div>
                            <a href="#">Privacy Policy</a>
                            &middot;
                            <a href="#">Terms &amp; Conditions</a>
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </body>
</html>
