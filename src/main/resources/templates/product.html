<!DOCTYPE html>

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
</head>
<body>
<div layout:fragment="content">
    <main>
        <div class="container-fluid px-4">
            <h3 class="mt-4 mb-4">상품관리</h3>
            <div class="card mb-4">
                <div class="card-header">
                    <i class="fas fa-table me-1"></i>
                    검색조건
                </div>
                <div class="card-body">
                    <div class="row mb-2 justify-content-end">
                        <div class="col-auto">
                            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#fullscreenModal">
                                등록
                            </button>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#fullscreenModal">
                                검색
                            </button>
                        </div>
                    </div>
                    <div class="row">
                        <table class="table table-bordered">
                            <tbody>
                            <tr>
                                <td class="col-lg-2">등록일자</td>
                                <td class="col-lg-10">
                                    <div class="row">
                                        <div class="col-lg-2">
                                            <input id="startDate" class="form-control" type="date" />
                                        </div>
                                        ~
                                        <div class="col-lg-2">
                                            <input id="endDate" class="form-control" type="date" />
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="col-lg-2">상품유형</td>
                                <td class="col-lg-10">
                                    <div class="row">
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                                            <label class="form-check-label" for="">
                                                기본형
                                            </label>
                                        </div>
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                                            <label class="form-check-label" for="">
                                                옵션형
                                            </label>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="col-lg-2">상품상태</td>
                                <td class="col-lg-10">
                                    <div class="row">
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                                            <label class="form-check-label" for="">
                                                전체
                                            </label>
                                        </div>
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                                            <label class="form-check-label" for="">
                                                판매중
                                            </label>
                                        </div>
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="">
                                            <label class="form-check-label" for="">
                                                판매중지
                                            </label>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="col-lg-2">판매형태</td>
                                <td class="col-lg-10">
                                    <div class="row">
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="checkbox" value="" id="">
                                            <label class="form-check-label" for="">
                                                픽업+배달
                                            </label>
                                        </div>
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="checkbox" value="" id="">
                                            <label class="form-check-label" for="">
                                                픽업
                                            </label>
                                        </div>
                                        <div class="col-lg-2">
                                            <input class="form-check-input" type="checkbox" value="" id="">
                                            <label class="form-check-label" for="">
                                                배달
                                            </label>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>검색</td>
                                <td>
                                    <div class="row">
                                        <div class="col-lg-2">
                                            <select class="form-select" aria-label="Default select example">
                                                <option selected>상품명</option>
                                                <option value="1">상품코드</option>
                                            </select>
                                        </div>
                                        <div class="col-lg-4">
                                            <input type="text" class="form-control" id="basicInput" />
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="card mb-4">
                <div class="card-header">
                    <i class="fas fa-table me-1"></i>
                    리스트
                </div>
                <div class="card-body">
                    <div id="productListTable"></div>
                </div>
                <script th:inline="javascript">
                    document.addEventListener("DOMContentLoaded", function() {
                        const productListTable = new Tabulator("#productListTable", {
                            height:"500px",
                            pagination: true,
                            paginationMode: "remote",
                            paginationCounter:"pages",
                            ajaxURL: "http://localhost:8080/product/list",
                            ajaxParams: { page: "1", pageLimit: "50"},
                            ajaxResponse:function(url, params, response){
                                return response;
                            },
                            columns:[
                                {title:"상품코드", field:"id", width:100, cellClick: function(e, cell){
                                        const targetElement = document.querySelector('[data-bs-target="#fullscreenModal"]');
                                        fetch(`http://localhost:8080/product/${cell.getValue()}`)
                                            .then(response => {
                                                if (!response.ok) {
                                                    throw new Error(`HTTP error! status: ${response.status}`);
                                                }
                                                return response.json();
                                            })
                                            .then(data => {
                                                basicOptionTable.setData(data.productOptions);
                                                setImages(data.attachFiles);
                                                mapProductDataToForm(data);

                                                if (targetElement) {
                                                    targetElement.click();
                                                }
                                            })
                                            .catch(error => {
                                                console.error('Error fetching data:', error);
                                            });
                                    }
                                },
                                {title:"상품명", field:"name", width:200},
                                {title:"가격", field:"price", width:120, hozAlign:"center"},
                                {title:"상품타입", field:"productType", width:100 },
                                {title:"판매여부", field:"isUse", hozAlign:"center", width:100}
                            ]
                        });
                    });

                    function mapProductDataToForm(productData) {
                        // 1. 텍스트 및 숫자 입력 필드 매핑 (ID 기준)
                        document.getElementById('name').value = productData.name || '';
                        document.getElementById('price').value = productData.price || 0;
                        document.getElementById('quantity').value = productData.quantity || 0;
                        document.getElementById('minQuantity').value = productData.minQuantity || 0;
                        document.getElementById('maxQuantity').value = productData.maxQuantity || 0;

                        // 2. 체크박스 매핑: '제한없음' (isInfiniteQty)
                        const infiniteQtyCheckbox = document.getElementById('isInfiniteQty');

                        if (infiniteQtyCheckbox) {
                            // 1이면 true (체크), 0이면 false (체크 해제)
                            infiniteQtyCheckbox.checked = (productData.isInfiniteQty === 1);

                            // '제한없음'이 체크되면, quantity 필드를 비활성화
                            if (productData.isInfiniteQty === 1) {
                                document.getElementById('quantity').disabled = true;
                            } else {
                                document.getElementById('quantity').disabled = false;
                            }
                        }

                        // 3. 라디오 버튼 매핑 함수
                        function setRadioValue(name, value) {
                            const selector = `input[name="${name}"][value="${value}"]`;
                            const radio = document.querySelector(selector);
                            if (radio) {
                                radio.checked = true;
                            }
                        }

                        // 4. 상품 유형 매핑 (productType: 1=기본형, 2=옵션형)
                        setRadioValue('productType', String(productData.productType)); // JSON이 숫자여도 HTML value는 문자열이므로 String() 처리

                        // 5. 상품 상태 매핑 (status: SALE, SOLDOUT, PENDING 등)
                        setRadioValue('status', productData.status);

                        // 6. 판매 형태 매핑 (isTakeOut, isDelivery 조합)
                        let saleFormValue = '';
                        const isTakeOut = productData.isTakeOut;
                        const isDelivery = productData.isDelivery;

                        if (isTakeOut === 1 && isDelivery === 1) {
                            saleFormValue = 'BOTH'; // 픽업+배달
                        } else if (isTakeOut === 1 && isDelivery === 0) {
                            saleFormValue = 'PICKUP'; // 픽업
                        } else if (isTakeOut === 0 && isDelivery === 1) {
                            saleFormValue = 'DELIVERY'; // 배달
                        }
                        // 'saleForm' 라디오 버튼 그룹에 계산된 값 적용
                        setRadioValue('saleForm', saleFormValue);
                    }

                    function setImages(files) {
                        const container = document.getElementById('carouselContainer');
                        container.innerHTML = '';

                        if (files.length === 0) return;

                        const carouselId = 'dynamicCarousel';
                        const carousel = document.createElement('div');
                        carousel.className = 'carousel slide';
                        carousel.id = carouselId;
                        carousel.setAttribute('data-bs-ride', 'carousel');

                        const indicators = document.createElement('div');
                        indicators.className = 'carousel-indicators';

                        const inner = document.createElement('div');
                        inner.className = 'carousel-inner';

                        Array.from(files).forEach((file, index) => {
                            // 인디케이터 버튼
                            const button = document.createElement('button');
                            button.type = 'button';
                            button.setAttribute('data-bs-target', '#' + carouselId);
                            button.setAttribute('data-bs-slide-to', index);
                            if (index === 0) button.className = 'active';
                            indicators.appendChild(button);

                            const item = document.createElement('div');
                            item.className = 'carousel-item' + (index === 0 ? ' active' : '');
                            const img = document.createElement('img');
                            img.setAttribute('name', 'uploadImage');

                            img.src = 'http://localhost:8080' + file.filePath;
                            img.className = 'd-block w-100';
                            item.appendChild(img);
                            inner.appendChild(item);
                        });

                        // 컨트롤 버튼
                        const prev = document.createElement('button');
                        prev.className = 'carousel-control-prev';
                        prev.type = 'button';
                        prev.setAttribute('data-bs-target', '#' + carouselId);
                        prev.setAttribute('data-bs-slide', 'prev');
                        prev.innerHTML = `<span class="carousel-control-prev-icon"></span>`;

                        const next = document.createElement('button');
                        next.className = 'carousel-control-next';
                        next.type = 'button';
                        next.setAttribute('data-bs-target', '#' + carouselId);
                        next.setAttribute('data-bs-slide', 'next');
                        next.innerHTML = `<span class="carousel-control-next-icon"></span>`;

                        // 조립
                        carousel.appendChild(indicators);
                        carousel.appendChild(inner);
                        carousel.appendChild(prev);
                        carousel.appendChild(next);
                        container.appendChild(carousel);
                    }
                </script>
            </div>
        </div>
        <div class="modal fade" id="fullscreenModal" tabindex="-1" aria-labelledby="fullscreenModalLabel" aria-hidden="true">
            <aside th:replace="fragments/popup/product-popup :: product-popup"></aside>
        </div>
    </main>
    <footer class="py-4 bg-light mt-auto">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center justify-content-between small">
                <div class="text-muted">Copyright &copy; Your Website 2023</div>
                <div>
                    <a href="#">Privacy Policy</a>
                    &middot;
                    <a href="#">Terms &amp; Conditions</a>
                </div>
            </div>
        </div>
    </footer>
</div>
</body>
</html>
