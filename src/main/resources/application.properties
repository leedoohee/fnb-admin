# ?? ?? ?? (???: 8080)
server.port=8080
spring.application.name=fnb-admin
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.web.resources.static-locations=classpath:/static/,classpath:/custom-static/


# ==================================
# 1. MariaDB DataSource ??
# ==================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.datasource.url=jdbc:mariadb://localhost:3306/fnb2?serverTimezone=UTC&characterEncoding=UTF-8

# ?????? ?? ??? ??
spring.datasource.username=root

# ?????? ??? ????
spring.datasource.password=1234


